name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.package_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
          - package_name: macos-x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - package_name: linux-x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - package_name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package release archive
        run: scripts/package-release.sh --target "${{ matrix.target }}" --package-name "${{ matrix.package_name }}"

      - name: Smoke test installed release workflow
        run: scripts/release-install-smoke.sh --artifact "dist/vc-tokmeter-${{ matrix.package_name }}.tar.gz" --platform "${{ matrix.package_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vc-tokmeter-${{ matrix.package_name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate combined checksums
        working-directory: dist
        run: sha256sum *.tar.gz > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* \
              --verify-tag \
              --title "$TAG_NAME" \
              --notes "vc-tokmeter release $TAG_NAME"
          fi
